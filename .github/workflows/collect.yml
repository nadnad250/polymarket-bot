name: Collect & Simulate

on:
  schedule:
    - cron: "*/5 * * * *"   # toutes les 5 min
  workflow_dispatch:        # déclenchement manuel

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps (lean)
        run: |
          python -m pip install --upgrade pip
          pip install httpx==0.27.2 pandas==2.2.3 numpy==1.26.4 \
                       lightgbm==4.5.0 xgboost==2.1.2 scikit-learn==1.5.2 \
                       python-dotenv==1.0.1

      - name: Run collect + simulate cycle
        run: python scripts/ci_cycle.py
        env:
          INITIAL_CAPITAL: "1000"

      - name: Export dashboard data
        run: python scripts/export_dashboard_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ public/data/ || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(data): auto-collect $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "Pas de changements à committer."
          fi
