name: Deploy Dashboard to Pages

on:
  # Re-deploy après chaque cycle Collect (workflow_run bypass la limitation
  # GITHUB_TOKEN qui empêche les workflows de se déclencher entre eux).
  workflow_run:
    workflows: ["Collect & Simulate"]
    types: [completed]
    branches: [main]

  # Push direct sur public/
  push:
    branches: [main]
    paths:
      - "public/**"

  # Filet de sécurité : redeploy toutes les 30 min
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion != 'failure' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
